<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BDO Class Selector</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #3498db;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        .container {
            display: flex;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Sidebar Filters */
        .filters-sidebar {
            flex: 1;
            min-width: 250px;
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            height: fit-content;
        }

        .filter-group {
            margin-bottom: 20px;
        }

        .filter-group h3 {
            margin-top: 0;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
            text-transform: capitalize;
        }

        .filter-option {
            display: block;
            margin: 8px 0;
            cursor: pointer;
        }

        /* Class Grid */
        .class-grid {
            flex: 3;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .class-card {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            transition: transform 0.2s, opacity 0.3s;
            border: 1px solid #2d2d2d;
        }

        .class-card.eliminated {
            opacity: 0.15;
            transform: scale(0.95);
            pointer-events: none;
        }

        .class-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .class-tags {
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
<body>

    <header>
        <h1>BDO Class Selector</h1>
        <p>Select criteria to eliminate classes that don't match your playstyle.</p>
    </header>

    <div class="container">
        <aside class="filters-sidebar">
            <div class="filter-group">
                <h3>Gender</h3>
                <label class="filter-option">
                    <input type="checkbox" class="filter-checkbox" data-category="gender" value="male"> Male
                </label>
                <label class="filter-option">
                    <input type="checkbox" class="filter-checkbox" data-category="gender" value="female"> Female
                </label>
            </div>
            
            </aside>

        <main class="class-grid" id="classGrid">
            </main>
    </div>

    <script>
        /**
         * ENGINEER NOTE: Add your tags here. 
         * To add a new filtering criteria, simply add a new key-value pair to these objects.
         * e.g., range: 'melee'
         */
        const CLASSES = [
            { name: 'Warrior', gender: 'male' },
            { name: 'Ranger', gender: 'female' },
            { name: 'Sorceress', gender: 'female' },
            { name: 'Berserker', gender: 'male' },
            { name: 'Tamer', gender: 'female' },
            { name: 'Musa', gender: 'male' },
            { name: 'Maehwa', gender: 'female' },
            { name: 'Valkyrie', gender: 'female' },
            { name: 'Kunoichi', gender: 'female' },
            { name: 'Ninja', gender: 'male' },
            { name: 'Wizard', gender: 'male' },
            { name: 'Witch', gender: 'female' },
            { name: 'Striker', gender: 'male' },
            { name: 'Mystic', gender: 'female' },
            { name: 'Archer', gender: 'male' },
            { name: 'Lahn', gender: 'female' },
            { name: 'Shai', gender: 'female' },
            { name: 'Guardian', gender: 'female' },
            { name: 'Hashashin', gender: 'male' },
            { name: 'Nova', gender: 'female' },
            { name: 'Sage', gender: 'male' },
            { name: 'Corsair', gender: 'female' },
            { name: 'Drakania', gender: 'female' },
            { name: 'Woosa', gender: 'female' },
            { name: 'Maegu', gender: 'female' },
            { name: 'Scholar', gender: 'female' },
            { name: 'Dosa', gender: 'male' }
        ];

        // Initialize Application
        document.addEventListener('DOMContentLoaded', () => {
            renderClasses();
            setupFilters();
        });

        // Render the initial list of all classes
        function renderClasses() {
            const grid = document.getElementById('classGrid');
            grid.innerHTML = CLASSES.map(cls => `
                <div class="class-card" id="class-${normalizeName(cls.name)}">
                    <div class="class-name">${cls.name}</div>
                    <div class="class-tags">${cls.gender}</div>
                </div>
            `).join('');
        }

        // Attach event listeners to all checkboxes
        function setupFilters() {
            const checkboxes = document.querySelectorAll('.filter-checkbox');
            checkboxes.forEach(cb => {
                cb.addEventListener('change', filterClasses);
            });
        }

        /**
         * Core Filtering Logic
         * Strategy: 
         * 1. Group active filters by their categories (e.g., { gender: ['male'] }).
         * 2. Loop through all classes.
         * 3. If a category has active filters, the class MUST match one of those selected filters.
         * 4. If it fails *any* active category check, it gets eliminated.
         */
        function filterClasses() {
            const checkboxes = document.querySelectorAll('.filter-checkbox:checked');
            
            // Map active checkboxes to an object: { category: [values] }
            const activeFilters = {};
            checkboxes.forEach(cb => {
                const category = cb.getAttribute('data-category');
                const value = cb.value;
                if (!activeFilters[category]) {
                    activeFilters[category] = [];
                }
                activeFilters[category].push(value);
            });

            // Evaluate each class against active filters
            CLASSES.forEach(cls => {
                const card = document.getElementById(`class-${normalizeName(cls.name)}`);
                let isEliminated = false;

                // Check every category that has at least one checkbox ticked
                for (const category in activeFilters) {
                    const allowedValues = activeFilters[category];
                    const classValue = cls[category];

                    // If the class tag doesn't match any of the selected filters in this category, eliminate it
                    if (!allowedValues.includes(classValue)) {
                        isEliminated = true;
                        break; // No need to check other categories for this class
                    }
                }

                // Toggle CSS class based on outcome
                if (isEliminated) {
                    card.classList.add('eliminated');
                } else {
                    card.classList.remove('eliminated');
                }
            });
        }

        // Helper to format string IDs safely (e.g., "Dark Knight" -> "dark-knight")
        function normalizeName(name) {
            return name.toLowerCase().replace(/\s+/g, '-');
        }
    </script>
</body>
</html>
